version: "3.8"

services:
  bot:
    build: .
    container_name: almabot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Mount assets directory for QR code generation
      - ./assets:/app/assets
    # Optional: uncomment for debugging
    # ports:
    #   - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
